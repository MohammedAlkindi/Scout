<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Scout - find your light</title>
    <meta
      name="description"
      content="Location-aware photography and outdoor activity recommendations, grounded in live conditions."
    />
    <meta name="color-scheme" content="dark light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Scout sessions">
        <div class="sidebar__top">
          <button class="icon-button hamburger" id="sidebar-toggle" type="button" aria-label="Toggle sessions">☰</button>
          <div class="sidebar__brand">Scout</div>
          <button class="button button--primary" id="new-session" type="button">New Scout</button>
        </div>
        <div class="sidebar__sessions" id="session-list"></div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar__title" id="active-session-title">New Scout</div>
          <div class="topbar__actions">
            <button class="icon-button" id="settings-open" type="button" aria-label="Open settings">⚙</button>
          </div>
        </header>
        <section class="content" id="main-content" aria-live="polite"></section>
      </main>
    </div>

    <div class="settings-overlay" id="settings-overlay"></div>
    <aside class="settings-panel" id="settings-panel" aria-label="Settings" aria-hidden="true"></aside>

    <script type="module" src="dist/main.js"></script>
  </body>
</html>
